<?xml version="1.0" encoding="UTF-8"?>
<!--
  POSTER PLACEHOLDER (demo) per gm-solar-hero.mp4.
  È un segnaposto branded (gradiente scuro + sole chartreuse): da sostituire
  con un frame reale del video (es. export JPG/WebP). Coerente con la regola
  di progetto "tutti gli asset sono PLACEHOLDER".
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1606"/>
      <stop offset="55%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#05070a"/>
    </linearGradient>
    <radialGradient id="sun" cx="72%" cy="32%" r="40%">
      <stop offset="0%" stop-color="#a8d920" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#a8d920" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a8d920" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#sun)"/>
  <circle cx="1382" cy="346" r="120" fill="#a8d920" fill-opacity="0.9"/>
  <!-- accenno di pannelli fotovoltaici a terra -->
  <g fill="#a8d920" fill-opacity="0.10">
    <rect x="120" y="860" width="360" height="90" transform="skewX(-18)"/>
    <rect x="640" y="860" width="360" height="90" transform="skewX(-18)"/>
    <rect x="1160" y="860" width="360" height="90" transform="skewX(-18)"/>
  </g>
</svg>
