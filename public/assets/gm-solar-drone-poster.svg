<?xml version="1.0" encoding="UTF-8"?>
<!--
  POSTER PLACEHOLDER (demo) per gm-solar-drone.mp4 (vista drone solar farm).
  Segnaposto branded: da sostituire con un frame reale del video.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="60%" stop-color="#0c1208"/>
      <stop offset="100%" stop-color="#05070a"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#field)"/>
  <!-- file di pannelli viste dall'alto, in prospettiva -->
  <g stroke="#a8d920" stroke-opacity="0.16" stroke-width="3">
    <line x1="0" y1="300" x2="1920" y2="240"/>
    <line x1="0" y1="440" x2="1920" y2="360"/>
    <line x1="0" y1="600" x2="1920" y2="500"/>
    <line x1="0" y1="800" x2="1920" y2="680"/>
    <line x1="0" y1="1040" x2="1920" y2="900"/>
  </g>
  <g stroke="#a8d920" stroke-opacity="0.08" stroke-width="2">
    <line x1="320" y1="0" x2="220" y2="1080"/>
    <line x1="760" y1="0" x2="700" y2="1080"/>
    <line x1="1200" y1="0" x2="1180" y2="1080"/>
    <line x1="1640" y1="0" x2="1660" y2="1080"/>
  </g>
</svg>
